<!DOCTYPE html>
<html>

<head>
  <title>Siemano siemano co tam u was?</title>


  <img src="https://bosswegorzewo.pl/wp-content/uploads/2024/02/boss.psd2-kopia.jpg" width="300">
  <style>
    body {
      background-color: #2f3c2e;
      font-family: Arial;
      text-align: center;
      padding: 60px;
    }

    h1 {
      color: #f5c518;
      font-size: 48px;
    }

    p {
      color: #cccccc;
      font-size: 20px;
    }

    button {
      background-color: #f5c518;
      color: #1a1a2e;
      font-size: 18px;
      font-weight: bold;
      padding: 14px 32px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 20px;
      display: block;
      margin-left: auto;
      margin-right: auto;
    }

    button:hover {
      background-color: #e0b000;
    }
  </style>
</head>

<body>

  <h1>Cześć wszystkim! </h1>

  <p>To jest moja pierwsza strona internetowa.</p>

  <button onclick="kliknij()">Darmowe bułeczki</button>
  <button onclick="zmienKolor()">Zmień kolor</button>

  <p id="wynik"></p>

  <script>
    let licznik = 0

    function kliknij() {
      licznik = licznik + 1
      document.getElementById("wynik").innerText = "Kliknąłeś " + licznik + " razy"
      document.getElementById("wynik").style.color = "#f5c518"
      document.getElementById("wynik").style.fontSize = "28px"
    }

    // Lista kolorów — każde kliknięcie zmienia na następny
    let kolory = ["#1a1a2e", "#2d0000", "#003300", "#1a0033", "#2f3c2e"]
    let aktualnyKolor = 0

    function zmienKolor() {
      aktualnyKolor = aktualnyKolor + 1
      if (aktualnyKolor >= kolory.length) {
        aktualnyKolor = 0
      }
      document.body.style.backgroundColor = kolory[aktualnyKolor]
    }
  </script>

</body>

</html>
